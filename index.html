<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Order summary card</title>
  <style>
    body{
      font-family:"Red Hat Display";
      background: url(./images/pattern-background-mobile.svg);
      background-repeat: no-repeat;
      background-size: 100% auto;
      background-color: hsl(225, 100%, 94%);

      font-size: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
  
      margin: 0; /*Removes all outside space */
    }
    h2{
      color: hsl(223, 47%, 23%);
      font-weight: 800;
    }
    .card{
      margin: 1rem;
      background-color: hsl(225, 100%, 98%);
      border-radius: 30px;
      max-width: 400px;
      overflow: hidden;
      /*  Important part*/
    }
    .content{
      padding: 1rem;
      text-align: center;
    }
    .image img{
      width: 100%;
    }
    .caption{
      color: hsl(224, 23%, 55%);
      font-weight: 600;
      text-wrap: balance;
    }
    .hero{
      max-width: 100%;
    }
    a{
      color: hsl(245, 75%, 52%);
      font-weight: 800;
      margin: 0 40px;
    }
    button{
      width: 100%;
      padding: 1rem;
      /* Design improvement and flexibility */
      background-color: hsl(245, 75%, 52%);
      color: hsl(225, 100%, 98%);
      border-radius: 10px;
      font-weight: 700;
      border: none;
      /* x-offset | y-offset | blur | color */
      box-shadow: 0 10px 8px hsl(245, 75%, 52%, 0.2);
    }

    .payment{
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: hsl(224, 23%, 55%, 0.1);
      border-radius: 15px;
      margin: 2rem 0;
    }
    .payment, button{
      width: 100%;
      max-width: 400px;
    }
    
    .payment .icon{
      width: 50px;
      height: 50px;
      position: relative;
      left: 1rem;
    }
    .plan{
      position: relative;
      top: 0.5rem;
    }
    .annual{
      color: hsl(223, 47%, 23%);
      font-weight: 800;
    }
    .price{
      color: hsl(224, 23%, 55%);
      font-weight: 600;
      position: relative;
      bottom: 15px;
    }
    .cancel{
      color:  hsl(224, 23%, 55%);
      font-weight: 800;
    }
    a:hover, button:hover, .cancel:hover{
      cursor: pointer;
    }
    a:hover{
      text-decoration: none;
    }
    .cancel:hover{
      color: hsl(223, 47%, 23%) ;
    }

    @media screen and (min-width: 768px){
      body{
        background: url(./images/pattern-background-desktop.svg);
        background-repeat: no-repeat;
        background-size: 100%;
        background-color: hsl(225, 100%, 94%);
      }
  }
  </style>
</head>
<body>
  <div class="card">
    <div class="image">
      <img class="hero" src="./images/illustration-hero.svg" alt="Hero-section image of a girl dancing">
    </div>
    <div class="content">
      <h2>Order Summary</h2>
      <p class="caption"> You can now listen to millions of songs, audiobooks, and podcasts on any 
      device anywhere you like!</p>
      <div class="payment">
        <img class="icon" src="./images/icon-music.svg" alt="Music note icon">
        <div class="plan">
          <p class="annual">Annual Plan</p>
          <p class="price">$59.99/year</p>
        </div>
        <a href="#">Change</a>
      </div>
      <button class="pay">Proceed to Payment</button>
      <p class="cancel">Cancel Order</p>
    </div>
  </div>

</body>
</html>
